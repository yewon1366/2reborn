<style>
:root{--navy:#0E1B2E;--navy2:#162438;--navy3:#1C2E45;--blue:#185FA5;--blue-mid:#378ADD;--blue-light:#85B7EB;--teal-light:#5DCAA5;--amber-light:#EF9F27;--red-light:#F09595;--white:#FAFAF8;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text-dim:rgba(255,255,255,0.38);--text-mid:rgba(255,255,255,0.62);--text-main:rgba(255,255,255,0.92)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans','Noto Sans KR',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;display:flex;flex-direction:column}
.top-nav{height:52px;background:rgba(14,27,46,0.92);backdrop-filter:blur(12px);border-bottom:0.5px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;position:sticky;top:0;z-index:50}
.back-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-dim);text-decoration:none;padding:5px 10px;border-radius:6px;border:0.5px solid var(--border);transition:all .15s}
.back-btn:hover{color:var(--white);border-color:var(--border2)}
.nav-logo{font-size:15px;font-weight:700;color:var(--white);letter-spacing:-.3px}
.nav-logo span{color:#378ADD}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.nav-icon-btn{width:32px;height:32px;border-radius:8px;border:0.5px solid var(--border);background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;position:relative}
.nav-icon-btn:hover{background:rgba(255,255,255,0.08)}
.notif-dot{width:6px;height:6px;border-radius:50%;background:#E24B4A;border:1.5px solid var(--navy);position:absolute;top:4px;right:4px}
.app{display:flex;flex:1}
.sidebar{width:200px;flex-shrink:0;background:var(--navy2);border-right:0.5px solid var(--border);display:flex;flex-direction:column;transition:width .22s ease,opacity .2s;overflow:hidden}
.sidebar.closed{width:0;opacity:0;pointer-events:none}
.sb-inner{width:200px;display:flex;flex-direction:column;flex:1;overflow:hidden}
.sb-logo{padding:18px 16px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px}
.sb-logo-mark{width:28px;height:28px;border-radius:7px;background:rgba(55,138,221,0.2);border:0.5px solid rgba(55,138,221,0.3);display:flex;align-items:center;justify-content:center}
.sb-logo-text{font-size:13px;font-weight:600;color:var(--text-main)}
.sb-logo-sub{font-size:10px;color:var(--text-dim);margin-top:1px}
.sb-nav{padding:10px 8px;flex:1}
.sb-sec{font-size:10px;color:var(--text-dim);padding:12px 8px 5px;letter-spacing:.07em;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;font-size:12px;color:var(--text-mid);cursor:pointer;margin-bottom:2px;text-decoration:none;transition:all .15s}
.sb-item:hover{background:rgba(255,255,255,0.05);color:var(--white)}
.sb-item.active{background:rgba(55,138,221,0.15);color:#85B7EB;border:0.5px solid rgba(55,138,221,0.2)}
.sb-item svg{width:14px;height:14px;flex-shrink:0;opacity:.7}
.sb-item.active svg{opacity:1}
.sb-bdg{font-size:9px;padding:1px 6px;border-radius:10px;background:rgba(224,75,74,0.2);color:#F09595;margin-left:auto;border:0.5px solid rgba(224,75,74,0.2)}
.sb-footer{padding:12px 10px;border-top:0.5px solid var(--border)}
.sb-avatar{width:28px;height:28px;border-radius:50%;background:rgba(55,138,221,0.2);border:0.5px solid rgba(55,138,221,0.3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#85B7EB;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.content-header{height:52px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;padding:0 22px;background:rgba(22,36,56,0.4)}
.ch-title{font-size:15px;font-weight:600;color:var(--text-main)}
.ch-sub{font-size:12px;color:var(--text-dim);margin-left:10px}
.ch-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.content{padding:20px 22px;flex:1;overflow:auto}
.card{background:rgba(255,255,255,0.03);border:0.5px solid var(--border);border-radius:12px;padding:16px 18px;transition:border-color .15s}
/* THUMB ROW */
.thumb-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.thumb{width:54px;height:66px;border-radius:6px;background:rgba(255,255,255,0.04);border:0.5px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:4px;transition:all .15s;position:relative}
.thumb:hover{border-color:var(--border2)}
.thumb.active{border:1.5px solid #378ADD;background:rgba(55,138,221,0.1)}
.thumb-num{font-size:10px;color:var(--text-dim)}
.thumb.active .thumb-num{color:#85B7EB}
.thumb-warn{position:absolute;top:3px;right:3px;width:8px;height:8px;border-radius:50%;background:#EF9F27}
/* SPLIT */
.split{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.2fr);gap:14px;margin-bottom:14px}
.panel{background:rgba(255,255,255,0.02);border:0.5px solid var(--border);border-radius:12px;overflow:hidden}
.panel-head{padding:10px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:12px;font-weight:500;color:var(--text-main)}
.panel-body{padding:14px}
/* RECEIPT IMAGE MOCK */
.receipt-canvas{background:#1a1a1a;border-radius:8px;min-height:460px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px 16px 16px;gap:12px;position:relative;overflow:hidden;border:0.5px solid var(--border)}
.receipt-paper{width:100%;max-width:280px;background:#f8f6f0;border-radius:2px;padding:16px 14px 20px;display:flex;flex-direction:column;gap:0;position:relative;box-shadow:0 4px 24px rgba(0,0,0,0.5)}
.receipt-paper::after{content:'';position:absolute;bottom:-8px;left:0;right:0;height:8px;background:repeating-linear-gradient(-45deg,#f8f6f0 0px,#f8f6f0 4px,transparent 4px,transparent 8px)}
.rt{font-family:'Noto Sans KR',sans-serif;color:#1a1a1a}
.rt-center{text-align:center}
.rt-bold{font-weight:700}
.rt-sm{font-size:10px;line-height:1.6;color:#444}
.rt-xs{font-size:9px;line-height:1.5;color:#666}
.rt-lg{font-size:14px;font-weight:700;color:#1a1a1a}
.rt-divider{border:none;border-top:1px dashed #bbb;margin:6px 0}
.rt-divider-solid{border:none;border-top:1px solid #999;margin:6px 0}
.rt-row{display:flex;justify-content:space-between;align-items:baseline}
.rt-hl{position:relative;display:inline-block}
.hl-ok-r{background:rgba(93,202,165,0.3);outline:1.5px solid #5DCAA5;border-radius:2px}
.hl-warn-r{background:rgba(239,159,39,0.3);outline:1.5px solid #EF9F27;border-radius:2px}
.hl-danger-r{background:rgba(240,149,149,0.35);outline:1.5px solid #F09595;border-radius:2px}
/* 하이라이팅 */
.hl-box{position:absolute;border-radius:2px;pointer-events:none}
.hl-warn{border:1.5px solid #EF9F27;background:rgba(239,159,39,0.15)}
.hl-ok{border:1.5px solid #5DCAA5;background:rgba(93,202,165,0.1)}
.hl-danger{border:1.5px solid #F09595;background:rgba(240,149,149,0.12)}
.receipt-legend{font-size:10px;color:var(--text-dim);display:flex;gap:10px;flex-wrap:wrap}
.hl-dot{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:4px}
/* FIELDS */
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:3px}
.field-label{font-size:10px;color:var(--text-dim)}
.field-val{font-size:13px;color:var(--text-main);background:rgba(255,255,255,0.04);border-radius:6px;padding:7px 10px;border:0.5px solid var(--border)}
.field-val.editable{border-color:rgba(55,138,221,0.3);background:rgba(55,138,221,0.06)}
.field-val.warn-field{border-color:rgba(239,159,39,0.4);background:rgba(239,159,39,0.06);color:#EF9F27}
/* ITEMS TABLE */
.items-table{width:100%;border-collapse:collapse;margin-bottom:12px}
.items-table th{font-size:10px;color:var(--text-dim);font-weight:500;padding:5px 8px;border-bottom:0.5px solid var(--border);text-align:left}
.items-table td{font-size:12px;color:var(--text-mid);padding:7px 8px;border-bottom:0.5px solid rgba(255,255,255,0.04)}
.items-table tr:last-child td{border-bottom:none}
.prob-bar{width:40px;height:5px;border-radius:3px;display:inline-block;vertical-align:middle;margin-left:4px}
/* WARN BOX */
.warn-box{background:rgba(224,75,74,0.08);border:0.5px solid rgba(224,75,74,0.25);border-radius:8px;padding:10px 12px;font-size:12px;color:#F09595;line-height:1.6;margin-bottom:12px}
/* TAG */
.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.tag{font-size:11px;padding:3px 9px;border-radius:10px;border:0.5px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text-mid);cursor:pointer;transition:all .15s}
.tag:hover{border-color:rgba(55,138,221,0.4);color:#85B7EB}
.tag.active{background:rgba(55,138,221,0.15);color:#85B7EB;border-color:rgba(55,138,221,0.3)}
.tag-add{font-size:11px;padding:3px 9px;border-radius:10px;border:1px dashed rgba(255,255,255,0.15);color:var(--text-dim);cursor:pointer}
.tag-add:hover{border-color:rgba(55,138,221,0.4);color:#85B7EB}
/* ACTION ROW */
.action-row{display:flex;gap:8px}
.btn-sec{font-size:12px;padding:8px 14px;border-radius:8px;border:0.5px solid var(--border);background:transparent;color:var(--text-mid);cursor:pointer;transition:all .15s}
.btn-sec:hover{border-color:var(--border2);color:var(--text-main)}
.btn-pri{font-size:12px;padding:8px 18px;border-radius:8px;border:none;background:#185FA5;color:#fff;cursor:pointer;font-weight:500;transition:background .15s;flex:1}
.btn-pri:hover{background:#0C447C}
/* LEDGER CONFIRM */
.ledger-confirm{display:none;background:rgba(29,158,117,0.08);border:0.5px solid rgba(29,158,117,0.3);border-radius:8px;padding:14px 16px;margin-top:12px}
.ledger-confirm.show{display:block}
.sb-toggle{width:32px;height:32px;border-radius:8px;border:0.5px solid var(--border);background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.sb-toggle:hover{background:rgba(255,255,255,0.08)}
.live-dot{width:7px;height:7px;border-radius:50%;background:#5DCAA5;animation:livepulse 2s infinite;flex-shrink:0}
@keyframes livepulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.collab-av{width:24px;height:24px;border-radius:50%;border:2px solid var(--navy);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;margin-left:-6px}
.collab-av:first-child{margin-left:0}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
</style>
</head>

function probBar(prob, color) {
  const w = Math.round(prob * 0.4);
  return `<span style="font-size:10px;color:${color}">${prob}%</span><div style="background:${color};opacity:0.6;width:${w}px;height:4px;border-radius:2px;display:block;margin-top:3px"></div>`;
}

function renderReceipt(idx) {
  const d = receipts[idx];

  // 이미지 패널 레이블
  document.getElementById('img-label').textContent = d.label;

  // 영수증 이미지
  const canvas = document.getElementById('receipt-canvas');
  canvas.innerHTML = d.receipt + `
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:4px">
      <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:rgba(255,255,255,0.45)"><span style="width:8px;height:8px;border-radius:2px;border:1.5px solid #5DCAA5;background:rgba(93,202,165,0.2);display:inline-block"></span>높은 확률</div>
      <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:rgba(255,255,255,0.45)"><span style="width:8px;height:8px;border-radius:2px;border:1.5px solid #EF9F27;background:rgba(239,159,39,0.2);display:inline-block"></span>중간 확률</div>
      <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:rgba(255,255,255,0.45)"><span style="width:8px;height:8px;border-radius:2px;border:1.5px solid #F09595;background:rgba(240,149,149,0.2);display:inline-block"></span>낮은 확률</div>
    </div>`;

  // 배지
  document.getElementById('result-badges').innerHTML = d.badge.map(b =>
    `<span style="font-size:10px;background:${b.bg};color:${b.color};padding:2px 7px;border-radius:8px">${b.text}</span>`
  ).join('');

  // 기본 필드
  document.getElementById('field-grid').innerHTML = d.fields.map(f => {
    const isWarn = f.v.includes('⚠');
    return `<div class="field"><div class="field-label">${f.l}</div><div class="field-val${isWarn?' warn-field':''}">${f.v}</div></div>`;
  }).join('');

  // 품목 테이블
  document.getElementById('items-tbody').innerHTML = d.items.map(item => {
    const bg = item.warn ? 'background:rgba(240,149,149,0.05);' : '';
    const nc = item.warn ? `color:${item.color};font-weight:500` : 'color:var(--text-main)';
    const pc = item.warn ? `color:${item.color}` : '';
    return `<tr style="${bg}">
      <td style="${nc}">${item.name}</td>
      <td>${item.qty}</td>
      <td style="${pc}">${item.price}</td>
      <td>${probBar(item.prob, item.color)}</td>
    </tr>`;
  }).join('');

  // 경고 박스
  document.getElementById('warn-area').innerHTML = d.warn
    ? `<div class="warn-box" style="margin-bottom:12px">${d.warn}</div>`
    : '';

  // 태그
  document.getElementById('tag-row').innerHTML =
    d.tags.map(t => `<div class="tag active" onclick="this.classList.toggle('active')">${t}</div>`).join('') +
    `<div class="tag-add" onclick="addTag()">+ 태그 추가</div>`;

  // 장부 반영 메시지
  document.getElementById('ledger-msg').textContent =
    `지출 장부에 ${d.total}이 기록되었습니다. ${d.tags.join(' ')} 태그로 아카이브에 저장됩니다.`;

  // 장부 반영 버튼 초기화
  document.getElementById('ledger-confirm').classList.remove('show');
}

function selectThumb(el, idx) {
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderReceipt(idx);
}

function toggleEdit() {
  const fields = document.querySelectorAll('.field-val');
  fields.forEach(f => {
    if (f.contentEditable === 'true') { f.contentEditable = 'false'; f.classList.remove('editable'); }
    else { f.contentEditable = 'true'; f.classList.add('editable'); }
  });
}

  const t = prompt('태그 이름을 입력하세요 (예: 환영회)');
  if (t) {
    const row = document.getElementById('tag-row');
    const add = row.querySelector('.tag-add');
    const tag = document.createElement('div');
    tag.className = 'tag active';
    tag.textContent = '#' + t;
    tag.onclick = () => tag.classList.toggle('active');
    row.insertBefore(tag, add);
  }
}

function reflectLedger() {
  document.getElementById('ledger-confirm').classList.add('show');
  document.getElementById('ledger-confirm').scrollIntoView({ behavior: 'smooth' });
}

function openUpload() { alert('영수증 사진 업로드 — 카메라 또는 파일 선택'); }

function toggleSb() { document.getElementById('sidebar').classList.toggle('closed'); }

function toggleSearch() {
  const bar = document.getElementById('search-bar');
  const open = bar.style.display === 'none' || bar.style.display === '';
  bar.style.display = open ? 'block' : 'none';
  if (open) document.getElementById('search-input').focus();
}

// 초기 렌더
renderReceipt(0);
</script>
</body>
</html>
